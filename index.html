<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Award Studios</title>
  <style>
    body { 
      background-color: black; 
      color: white; 
      font-family: 'Courier New', Courier, monospace; 
      margin: 0;
    }
    header {
      background-color: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }
    header h1 {
      font-family: Georgia, serif;
      margin: 0;
    }
    header img.icon {
      width: 32px;
      height: 32px;
      cursor: pointer;
    }
    nav {
      position: relative;
      display: inline-block;
    }
    nav ul {
      display: none;
      position: absolute;
      right: 0;
      background-color: #222;
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid #444;
      width: 180px;
    }
    nav ul li {
      border-bottom: 1px solid #555;
    }
    nav ul li:last-child {
      border-bottom: none;
    }
    nav ul li a {
      display: block;
      padding: 10px 15px;
      color: white;
      text-decoration: none;
      font-family: 'Courier New', Courier, monospace;
    }
    nav ul li a:hover {
      background-color: #333;
    }
    nav:hover ul {
      display: block;
    }
    .banner {
      text-align: center;
    }
    .banner img {
      max-width: 100%;
    }
    .content {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h2 {
      font-family: Georgia, serif;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }
  </style>
</head>
<body>
  <!-- Main Header con icono y menú -->
  <header>
    <h1>Award Studios</h1>
    <nav>
      <img src="icon.png" alt="Menu Icon" class="icon">
      <ul>
        <li><a href="#news">News</a></li>
        <li><a href="#contact">Contact & Support</a></li>
        <li><a href="#about">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- Banner -->
  <div class="banner">
    <img src="banner.jpeg" alt="Award Studios Banner">
  </div>

  <!-- Secciones con títulos -->
  <div class="content">
    <section id="news">
      <h2>News</h2>
      <p>Latest updates and announcements from Award Studios.</p>
    </section>

    <section id="contact">
      <h2>Contact & Support</h2>
      <p>For inquiries, reach us at: support.awardstudios@gmail.com</p>
    </section>

    <section id="about">
      <h2>About</h2>
      <p>Award Studios is dedicated to preserving gaming history and creating retro-inspired experiences.</p>
    </section>
  </div>
</body>
</html>
