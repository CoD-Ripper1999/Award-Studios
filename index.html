<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Award Studios</title>
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="description" content="Award Studios - Official site for digital preservation, restoration, and retro-inspired projects.">
  <meta name="keywords" content="Award Studios, preservation, retro, digital heritage, restoration">
  <style>
    body { 
      background-color: black; 
      color: white; 
      font-family: 'Courier New', Courier, monospace; 
      margin: 0;
      font-size: 18px;
    }
    header {
      background-color: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }
    header h1 {
      font-family: Georgia, serif;
      margin: 0;
      font-size: 34px;
    }
    header img.icon {
      width: 32px;
      height: 32px;
      cursor: pointer;
    }
    nav {
      position: relative;
      display: inline-block;
    }
    nav ul {
      display: none;
      position: absolute;
      right: 0;
      background-color: #222;
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid #444;
      width: 180px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    nav ul li {
      border-bottom: 1px solid #555;
    }
    nav ul li:last-child {
      border-bottom: none;
    }
    nav ul li a {
      display: block;
      padding: 10px 15px;
      color: white;
      text-decoration: none;
      font-family: 'Courier New', Courier, monospace;
    }
    nav ul li a:hover {
      background-color: #333;
    }
    nav ul.show {
      display: block;
      max-height: 500px; /* suficiente para mostrar todos los items */
      transition: max-height 0.3s ease-in;
    }
    .banner {
      text-align: center;
    }
    .banner img {
      max-width: 100%;
      transition: opacity 1s ease-in-out;
    }
    .content {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h2 {
      font-family: Georgia, serif;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
      font-size: 26px;
    }
    footer {
      background:#111; 
      color:#aaa; 
      text-align:center; 
      padding:10px; 
      font-size:14px;
    }
  </style>
</head>
<body>
  <!-- Main Header con icono y menú -->
  <header>
    <h1>Award Studios</h1>
    <nav>
      <img src="icon.png" alt="Menu Icon" class="icon">
      <ul>
        <li><a href="./about.html">About</a></li>
        <li><a href="/Award-Studios/news.html">News</a></li>
        <li><a href="/Award-Studios/contact_us.html">Contact & Support</a></li>
      </ul>
    </nav>
  </header>

  <!-- Banner con carrusel -->
  <div class="banner">
    <img id="bannerImage" src="banner1.jpeg" alt="Award Studios Banner">
  </div>

  <!-- Footer -->
  <footer>
    Award Studios · Official Website · 2026
  </footer>

  <!-- Script carrusel y menú -->
  <script>
    // Carrusel de banners
    const images = ["banner1.jpeg", "banner2.jpeg"];
    let index = 0;
    function changeImage() {
      const banner = document.getElementById("bannerImage");
      banner.style.opacity = 0;
      setTimeout(() => {
        index = (index + 1) % images.length;
        banner.src = images[index];
        banner.style.opacity = 1;
      }, 1000);
    }
    setInterval(changeImage, 10000);

    // Menú con animación y cierre automático
    const icon = document.querySelector('header img.icon');
    const menu = document.querySelector('nav ul');
    let inactivityTimer;

    icon.addEventListener('click', () => {
      menu.classList.toggle('show');
      clearTimeout(inactivityTimer);
      if (menu.classList.contains('show')) {
        inactivityTimer = setTimeout(() => {
          menu.classList.remove('show');
        }, 12000); // 12 segundos
      }
    });

    menu.addEventListener('mouseover', () => {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        menu.classList.remove('show');
      }, 12000);
    });
  </script>
</body>
</html>
